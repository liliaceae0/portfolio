<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <link rel="stylesheet" href="style.css">
    <title>Contact — Portfolio Esra</title>
    <style>
        .contact-container {
            width: 100%;
            min-height: 90vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            position: relative;
            z-index: 1;
            padding: 2rem;
        }

        .title-container {
            text-align: center;
            margin-bottom: 2.5rem;
            position: relative;
        }

        .contact-title {
            color: white;
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .moving-underline {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, #d4638b, #9d6edd);
            border-radius: 2px;
            position: absolute;
            bottom: -10px;
            left: 0;
            animation: moveUnderline 2.5s infinite ease-in-out;
        }

        @keyframes moveUnderline {
            0%   { left: 0; }
            50%  { left: calc(100% - 80px); }
            100% { left: 0; }
        }

        .contact-form {
            width: 90%;
            max-width: 580px;
            padding: 2.5rem;
            background: rgba(10, 8, 22, 0.72);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.07);
            box-shadow: 0 20px 60px rgba(157, 110, 221, 0.1);
            animation: formPulse 4s infinite ease-in-out;
        }

        @keyframes formPulse {
            0%, 100% { box-shadow: 0 20px 60px rgba(157, 110, 221, 0.1); }
            50%       { box-shadow: 0 24px 70px rgba(212, 99, 139, 0.15); }
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: rgba(157, 110, 221, 0.5);
            box-shadow: 0 0 0 3px rgba(157, 110, 221, 0.12);
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group textarea {
            min-height: 140px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #9d6edd, #d4638b);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            animation: shine 3.5s infinite;
        }

        @keyframes shine {
            0%   { left: -100%; }
            20%  { left: 100%; }
            100% { left: 100%; }
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(157, 110, 221, 0.3);
        }

        @media (max-width: 600px) {
            .contact-form { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
    </div>

    <nav>
        <div class="nav-container">
            <div class="logo" data-aos="zoom-in" data-aos-duration="1500">
                Esra <span>Atia</span>
            </div>
            <div class="links">
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="100"><a href="index.html">Accueil</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="150"><a href="btssio.html">BTS SIO</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="200"><a href="e5.html">Épreuve 5</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="300"><a href="profil.html">Profil</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="400"><a href="veille.html">Veille</a></div>
                <div class="link" data-aos="fade-up" data-aos-duration="1500" data-aos-delay="500"><a href="contact.html">Contact</a></div>
            </div>
            <i class="fa-solid fa-bars hamburg" onclick="hamburg()"></i>
        </div>
        <div class="dropdown">
            <div class="links">
                <a href="index.html">Accueil</a>
                <a href="btssio.html">BTS SIO</a>
                <a href="e5.html">Épreuve 5</a>
                <a href="profil.html">Profil</a>
                <a href="veille.html">Veille</a>
                <a href="contact.html">Contact</a>
                <i class="fa-solid fa-xmark cancel" onclick="cancel()"></i>
            </div>
        </div>
    </nav>

    <div class="contact-container">
        <div class="title-container" data-aos="fade-down" data-aos-duration="1200">
            <h1 class="contact-title">Créons de belles choses ensemble !</h1>
            <div class="moving-underline"></div>
        </div>

        <form class="contact-form" id="contactForm" data-aos="zoom-in" data-aos-duration="1200" data-aos-delay="200">
            <div class="form-group" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="350">
                <input type="text" id="cName" placeholder="Votre nom" required>
            </div>
            <div class="form-group" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="500">
                <input type="email" id="cEmail" placeholder="Votre email" required>
            </div>
            <div class="form-group" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="650">
                <textarea id="cMsg" placeholder="Votre message" required></textarea>
            </div>
            <button type="submit" class="submit-btn" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="800">
                Envoyer
            </button>
        </form>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>AOS.init({ offset: 0 });</script>
    <script src="script.js"></script>
</body>
</html>
